<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена | Живой ИИ</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131a2c;
            --accent-blue: #007aff;
            --text-main: #ffffff;
            --text-muted: #8e9e93;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .error-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 40px 24px;
            max-width: 460px;
            width: 100%;
            border: 1px solid #222e4b;
        }
        .error-code {
            font-size: 72px;
            font-weight: 800;
            color: var(--accent-blue);
            line-height: 1;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-main);
        }
        p {
            font-size: 16px;
            color: #d1d1d6;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .btn-home {
            display: inline-block;
            background-color: var(--accent-blue);
            color: #ffffff;
            text-align: center;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            font-size: 17px;
            min-height: 56px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(0, 122, 255, 0.35);
            border: none;
            cursor: pointer;
        }
        .btn-home:active {
            transform: scale(0.97);
        }
        @media (max-width: 500px) {
            .error-code {
                font-size: 56px;
            }
            .error-card {
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">404</div>
        <h1>Упс! Страница потерялась в нейросетях</h1>
        <p>Этот промпт выдал ошибку. Возможно, статья была удалена или ссылка написана с опечаткой.</p>
        <a href="index.html" class="btn-home">Вернуться на главную</a>
    </div>
</body>
</html>
